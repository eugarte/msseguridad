# SonarQube Configuration
# Project identification
sonar.projectKey=msseguridad
sonar.projectName=Microservicio de Seguridad y Autenticacion
sonar.projectVersion=1.0.0
sonar.organization=msseguridad-org

# Source code
sonar.sources=src
sonar.tests=test
sonar.inclusions=**/*.ts
sonar.exclusions=node_modules/**,dist/**,coverage/**,logs/**,docker/**,scripts/**

# TypeScript
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8

# Coverage
sonar.coverage.exclusions=test/**,src/**/*.spec.ts,src/**/*.test.ts,src/**/*.dto.ts,src/**/*.entity.ts

# Duplications
sonar.cpd.exclusions=test/**

# Security
sonar.security.hotspots=active
sonar.security.issue.severity.blocker=active
sonar.security.issue.severity.critical=active
sonar.security.issue.severity.major=active

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Analysis mode
sonar.verbose=false
