apiVersion: v2
name: msseguridad
description: A Helm chart for msseguridad - Microservicio de Seguridad y Autenticacion
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - security
  - authentication
  - oauth2
  - nodejs
  - microservice
home: https://github.com/eugarte/msseguridad
sources:
  - https://github.com/eugarte/msseguridad
maintainers:
  - name: msseguridad Team
    email: team@msseguridad.example.com
dependencies:
  - name: mysql
    version: 9.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: mysql.enabled
  - name: redis
    version: 18.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
