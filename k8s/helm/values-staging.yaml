replicaCount: 2

image:
  tag: "staging"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 60

env:
  - name: NODE_ENV
    value: "staging"
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "debug"
  - name: DB_HOST
    value: "mysql-staging.msseguridad.svc.cluster.local"
  - name: DB_PORT
    value: "3306"
  - name: DB_NAME
    value: "msseguridad_staging"
  - name: DB_USER
    valueFrom:
      secretKeyRef:
        name: msseguridad-db-credentials
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: msseguridad-db-credentials
        key: password
  - name: REDIS_HOST
    value: "redis-staging.msseguridad.svc.cluster.local"
  - name: REDIS_PORT
    value: "6379"
  - name: JWT_PRIVATE_KEY_PATH
    value: "/secrets/jwt/private.pem"
  - name: JWT_PUBLIC_KEY_PATH
    value: "/secrets/jwt/public.pem"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
  hosts:
    - host: staging.msseguridad.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: msseguridad-staging-tls
      hosts:
        - staging.msseguridad.example.com

serviceMonitor:
  enabled: true
